<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageAI</title>
  <link rel="stylesheet" href="panel.css" />
</head>

<body>
  <div id="app">
    <header class="header header-with-theme">
      <div class="header-main">
        <h1 class="title">Page AI</h1>
        <p class="subtitle">Chat with current page</p>
      </div>
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button" class="theme-toggle-btn" data-theme="light" aria-pressed="false" aria-label="Light theme" title="Light">☀</button>
        <button type="button" class="theme-toggle-btn" data-theme="dark" aria-pressed="false" aria-label="Dark theme" title="Dark">☽</button>
        <button type="button" class="theme-toggle-btn" data-theme="system" aria-pressed="true" aria-label="System theme" title="Auto">◐</button>
      </div>
    </header>

    <nav class="tab-bar" role="tablist">
      <button type="button" id="tab-chat" class="tab-btn tab-btn-active" role="tab" aria-selected="true">Chat</button>
      <button type="button" id="tab-search" class="tab-btn" role="tab" aria-selected="false">Search</button>
      <button type="button" id="tab-settings" class="tab-btn" role="tab" aria-selected="false">Settings</button>
      <button type="button" id="clear-chat-btn" class="tab-bar-action clear-chat-btn" aria-label="Clear chat" title="Clear chat">Clear chat</button>
    </nav>

    <div id="chat-container" class="chat-container tab-panel">
      <div id="messages" class="messages"></div>
      <div class="chat-input-container">
        <div class="chat-input-box">
          <textarea id="chat-input" placeholder="Ask about this page..." rows="2"></textarea>
          <div class="chat-input-footer">
            <select id="chat-model-select" class="model-inline" aria-label="Model" title="Model"></select>
            <button type="button" id="send-button" class="play-stop-btn" aria-label="Send" title="Send">▶</button>
          </div>
        </div>
      </div>
    </div>

    <div id="search-panel" class="search-panel tab-panel hidden">
      <div class="search-content">
        <label class="search-label">
          <span class="label-text">Search saved pages</span>
          <div class="search-row">
            <input id="search-pages-input" type="text" placeholder="Enter query..." aria-label="Search query" />
            <button type="button" id="search-pages-btn" class="secondary">Search</button>
          </div>
        </label>
        <div id="search-status" class="status search-status" aria-live="polite"></div>
        <ul id="search-results" class="search-results" aria-label="Search results"></ul>
        <div class="search-actions">
          <button type="button" id="summarize-selected-btn" class="primary" disabled>Summarize selected</button>
        </div>
      </div>
    </div>

    <div id="settings-panel" class="settings-panel tab-panel hidden">
      <div class="settings-layout-two-col settings-layout-panel">
        <nav class="settings-nav" role="navigation" aria-label="Settings sections">
          <button type="button" class="settings-nav-item is-active" data-section="llm">LLM</button>
          <button type="button" class="settings-nav-item" data-section="browser">Browser</button>
          <button type="button" class="settings-nav-item" data-section="mcp">MCP</button>
          <button type="button" class="settings-nav-item" data-section="rules">Rules</button>
          <button type="button" class="settings-nav-item" data-section="skills">Skills</button>
        </nav>
        <main class="settings-main">
          <section id="panel-section-llm" class="settings-section" aria-label="LLM">
            <div class="settings-content">
              <div class="settings-row">
                <span class="settings-row-label">LLM</span>
                <div class="settings-row-control">
                  <select id="llm-config-select" class="model-select" aria-label="LLM config"></select>
                  <button id="llm-config-open-options" type="button" class="secondary" title="Add or edit configs">Add…</button>
                </div>
              </div>
              <div class="settings-row">
                <span class="settings-row-label">Max tokens</span>
                <div class="settings-row-control">
                  <input id="llm-max-tokens" type="number" min="128" max="32768" placeholder="2048" />
                </div>
              </div>
              <span id="llm-status" class="status"></span>
            </div>
          </section>
          <section id="panel-section-browser" class="settings-section hidden" aria-label="Browser automation">
            <div class="settings-content">
              <div class="settings-row settings-row-toggle">
                <span class="settings-row-label">Browser automation</span>
                <div class="settings-row-control">
                  <label class="toggle-wrap" for="browser-automation-enabled">
                    <input type="checkbox" id="browser-automation-enabled" class="toggle-input" />
                    <span class="toggle" aria-hidden="true"></span>
                  </label>
                </div>
              </div>
            </div>
          </section>
          <section id="panel-section-mcp" class="settings-section hidden" aria-label="MCP">
            <div class="settings-content">
              <div class="settings-row settings-row-vertical">
                <span class="settings-row-label">MCP servers (JSON)</span>
                <div class="settings-row-control">
                  <textarea id="mcp-servers-config" rows="10" placeholder='{"mcpServers":{"name":{"url":"...","headers":{}}}}'></textarea>
                </div>
              </div>
              <div id="mcp-servers-list" class="mcp-servers-list" aria-label="MCP servers toggles"></div>
              <span id="mcp-status" class="status"></span>
            </div>
          </section>
          <section id="panel-section-rules" class="settings-section hidden" aria-label="Rules">
            <div class="settings-content">
              <div class="settings-row settings-row-vertical">
                <span class="settings-row-label">Agent rules</span>
                <div class="settings-row-control">
                  <textarea id="panel-agent-rules" rows="4" placeholder="Rules for the agent…"></textarea>
                  <span id="panel-rules-status" class="status"></span>
                </div>
              </div>
            </div>
          </section>
          <section id="panel-section-skills" class="settings-section hidden" aria-label="Skills">
            <div class="settings-content">
              <div class="settings-row settings-row-vertical">
                <span class="settings-row-label">Agent skills</span>
                <div class="settings-row-control">
                  <textarea id="panel-agent-skills" rows="4" placeholder="Skills and capabilities…"></textarea>
                  <span id="panel-skills-status" class="status"></span>
                </div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>

  <script type="module" src="panel.js"></script>
</body>

</html>
