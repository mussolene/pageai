<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageAI – Options</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="title">PageAI – Options</h1>
        <p class="subtitle">Configure LLM and MCP</p>
      </header>

      <section id="settings-panel" class="settings-panel">
        <details open>
          <summary id="options-llm-summary">LLM configs</summary>
          <div class="settings-content">
            <div id="llm-config-chips" class="llm-config-chips" aria-label="Saved LLM configs"></div>
            <button id="llm-config-add" type="button" class="secondary">Add</button>
            <div id="llm-config-form" class="llm-config-form" hidden>
              <label>
                <span class="label-text">Name</span>
                <input id="llm-config-name" type="text" placeholder="e.g. LM Studio" />
              </label>
              <label>
                <span class="label-text">Endpoint type</span>
                <select id="llm-config-endpoint-type" aria-label="Endpoint type">
                  <option value="chat">Chat (OpenAI-compatible)</option>
                  <option value="custom">Custom URL</option>
                </select>
              </label>
              <label>
                <span class="label-text">Endpoint</span>
                <div class="settings-row endpoint-row">
                  <input id="llm-config-endpoint" type="text" placeholder="http://localhost:1234" />
                  <button id="llm-config-auto" type="button" class="secondary" title="Detect">Auto</button>
                </div>
              </label>
              <label>
                <span class="label-text">Model</span>
                <input id="llm-config-model" type="text" list="llm-config-models-datalist" placeholder="qwen/qwen3-4b-2507" autocomplete="off" />
                <datalist id="llm-config-models-datalist"></datalist>
              </label>
              <label>
                <span class="label-text">API key (optional)</span>
                <input id="llm-config-api-key" type="password" />
              </label>
              <div class="llm-config-form-actions">
                <button id="llm-config-save" type="button">Save</button>
                <button id="llm-config-cancel" type="button" class="secondary">Cancel</button>
              </div>
            </div>
            <span id="llm-status" class="status"></span>
          </div>
        </details>
        <details>
          <summary>Browser automation</summary>
          <div class="settings-content">
            <label class="browser-automation-row">
              <input type="checkbox" id="browser-automation-enabled" class="toggle-input" />
              <span class="toggle" aria-hidden="true"></span>
              <span class="label-text">Allow assistant to click and fill fields on the page</span>
            </label>
          </div>
        </details>
        <details>
          <summary id="options-mcp-summary">MCP servers (JSON)</summary>
          <div class="settings-content">
            <label>
              <span class="label-text" id="options-mcp-label">MCP servers (JSON)</span>
              <textarea id="mcp-servers-config" rows="14" placeholder='{"mcpServers":{"name":{"url":"...","headers":{}}}}'></textarea>
            </label>
            <div id="mcp-servers-list" class="mcp-servers-list" aria-label="MCP servers toggles"></div>
            <span id="mcp-status" class="status"></span>
          </div>
        </details>
      </section>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
